name: Android Release

on:
  workflow_dispatch:
    inputs:
      upload_to_play_store:
        description: Upload the generated bundle to Google Play
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      EXPO_OWNER: ${{ vars.EXPO_OWNER }}
      EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE }}
      EXPO_IOS_BUNDLE_IDENTIFIER: ${{ vars.EXPO_IOS_BUNDLE_IDENTIFIER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties','**/build.gradle*','**/settings.gradle*') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore & verify
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eo pipefail
          # Compute secret length robustly and without adding newlines
          SECRET_LEN=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | wc -c)
          echo "Secret length: $SECRET_LEN"
          if [ "$SECRET_LEN" -lt 100 ]; then
            echo "Keystore secret is unexpectedly short; refusing to continue."
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          # Decode safely using printf to avoid echo interpretation issues
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > "$KEYSTORE_PATH"
          FILE_SIZE=$(stat -c%s "$KEYSTORE_PATH")
          echo "Decoded size: $FILE_SIZE"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "Decoded keystore is unexpectedly small; refusing to continue."
            exit 1
          fi
          echo "Keystore on disk:"
          sha256sum "$KEYSTORE_PATH" || true
          ls -l "$KEYSTORE_PATH" || true
        shell: bash

      - name: Build Android release
        run: npm run build:android:local
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            android/app/build/outputs/**/*.aab
            android/app/build/outputs/**/*.apk

      - name: Setup Ruby
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_play_store }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Upload to Play Store
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_play_store }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.EXPO_ANDROID_PACKAGE }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
