name: Trunk Validation

on:
  push:
  workflow_dispatch:

jobs:
  static:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run test:ci:static

      - name: Validate fake server harness
        run: npm run test:fake-server:self

  flow-regression:
    runs-on: ubuntu-latest
    needs: static
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run CI flow suite against fake OpenCode server
        run: npm run test:e2e:web
        env:
          CI: 'true'
          EXPO_PUBLIC_E2E_MODE: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  android-build:
    runs-on: ubuntu-latest
    needs: static
    permissions:
      contents: read

    env:
      EXPO_NO_TELEMETRY: 1
      EXPO_APP_VARIANT: development
      EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE }}
      EXPO_ANDROID_PACKAGE_DEV: ${{ vars.EXPO_ANDROID_PACKAGE_DEV }}
      GRADLE_ARGS: --stacktrace --info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-trunk-build-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties','**/build.gradle*','**/settings.gradle*') }}
          restore-keys: |
            gradle-trunk-build-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Android development APK
        run: npm run build:development:android

      - name: Upload Android build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-trunk-diagnostics
          path: |
            android/build/reports/**
            android/app/build/reports/**
            android/**/build/tmp/kotlin-classes/**
            android/**/build/*.log
          if-no-files-found: ignore
